/* ── HOOKS ── */
function useReveal(threshold=0.12){
  const ref=useRef(null);
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true)},{threshold});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[threshold]);
  return[ref,vis];
}

/* ── CURSOR ── */
function Cursor(){
  const c=useRef(null),f=useRef(null);
  useEffect(()=>{
    const mv=e=>{
      if(c.current){c.current.style.left=e.clientX+'px';c.current.style.top=e.clientY+'px'}
      setTimeout(()=>{if(f.current){f.current.style.left=e.clientX+'px';f.current.style.top=e.clientY+'px'}},80);
    };
    window.addEventListener('mousemove',mv);
    return()=>window.removeEventListener('mousemove',mv);
  },[]);
  return(<><div ref={c} className="cursor"/><div ref={f} className="cursor-f"/></>);
}

/* ── TYPEWRITER ── */
function TypeWriter({texts}){
  const[idx,setIdx]=useState(0);
  const[txt,setTxt]=useState('');
  const[del,setDel]=useState(false);
  useEffect(()=>{
    const cur=texts[idx];let t;
    if(!del&&txt.length<cur.length){t=setTimeout(()=>setTxt(cur.slice(0,txt.length+1)),65)}
    else if(!del&&txt.length===cur.length){t=setTimeout(()=>setDel(true),1800)}
    else if(del&&txt.length>0){t=setTimeout(()=>setTxt(txt.slice(0,-1)),35)}
    else if(del&&txt.length===0){setDel(false);setIdx((idx+1)%texts.length)}
    return()=>clearTimeout(t);
  },[txt,del,idx,texts]);
  return(<span style={{color:'#8b5cf6'}}>{txt}<span style={{animation:'blink 1s step-end infinite',color:'#06b6d4'}}>|</span></span>);
}

/* ── PARTICLES ── */
function HeroCanvas(){
  const cv=useRef(null);
  useEffect(()=>{
    const canvas=cv.current,ctx=canvas.getContext('2d');
    let anim;
    const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight};
    resize();window.addEventListener('resize',resize);
    const P=Array.from({length:70},()=>({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
      r:Math.random()*1.8+.4,op:Math.random()*.45+.1,
      col:Math.random()>.5?'139,92,246':'6,182,212',
    }));
    const draw=()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      P.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.col},${p.op})`;ctx.fill();
      });
      for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){
        const dx=P[i].x-P[j].x,dy=P[i].y-P[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){ctx.beginPath();ctx.moveTo(P[i].x,P[i].y);ctx.lineTo(P[j].x,P[j].y);
          ctx.strokeStyle=`rgba(139,92,246,${.07*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke()}
      }
      anim=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(anim);window.removeEventListener('resize',resize)};
  },[]);
  return<canvas ref={cv} id="hero-canvas"/>;
}

/* ── STAT CARD ── */
function StatCard({stat,delay}){
  const[count,setCount]=useState(0);
  const ref=useRef(null);const done=useRef(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!done.current){
        done.current=true;let s=0;
        const step=Math.ceil(stat.value/50);
        const t=setInterval(()=>{s+=step;if(s>=stat.value){setCount(stat.value);clearInterval(t)}else setCount(s)},28);
      }
    },{threshold:.5});
    if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[stat.value]);
  return(
    <div ref={ref} style={{textAlign:'center',opacity:0,animation:`fadeUp .6s ${delay}s ease forwards`}}>
      <div style={{fontFamily:"'Outfit',sans-serif",fontSize:'clamp(1.8rem,3.5vw,2.6rem)',fontWeight:800,background:'linear-gradient(135deg,#8b5cf6,#06b6d4)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
        {count}{stat.suffix}
      </div>
      <div style={{fontSize:'.78rem',color:'var(--t4)',fontFamily:"'JetBrains Mono',monospace",marginTop:'3px',textTransform:'uppercase',letterSpacing:'.08em'}}>{stat.label}</div>
    </div>
  );
}

function RadarChart(){
  const[r,v]=useReveal();
  const cats=[
    {l:'Python',val:95,c:'#8b5cf6'},{l:'ML/AI',val:88,c:'#06b6d4'},
    {l:'DuckDB',val:92,c:'#10b981'},{l:'FastAPI',val:87,c:'#ec4899'},
    {l:'Streamlit',val:90,c:'#f59e0b'},{l:'LangChain',val:85,c:'#8b5cf6'},
  ];
  const cx=145,cy=145,R=105;
  const pts=cats.map((c,i)=>{
    const a=(i/cats.length)*Math.PI*2-Math.PI/2;
    const rv=v?(R*c.val/100):0;
    return{x:cx+rv*Math.cos(a),y:cy+rv*Math.sin(a),lx:cx+(R+26)*Math.cos(a),ly:cy+(R+26)*Math.sin(a),...c};
  });
  return(
    <div ref={r} className="glass" style={{padding:'1.6rem',display:'flex',flexDirection:'column',alignItems:'center',opacity:v?1:0,transform:v?'none':'translateY(28px)',transition:'all .6s ease .5s'}}>
      <div style={{fontWeight:700,fontSize:'.97rem',color:'#f1f5f9',marginBottom:'1rem'}}>Competency Radar</div>
      <svg width="290" height="290" viewBox="0 0 290 290">
        {[.25,.5,.75,1].map((f,i)=>(
          <polygon key={i} points={cats.map((_,ci)=>{const a=(ci/cats.length)*Math.PI*2-Math.PI/2;return`${cx+R*f*Math.cos(a)},${cy+R*f*Math.sin(a)}`}).join(' ')} fill="none" stroke="rgba(139,92,246,.1)" strokeWidth="1"/>
        ))}
        {cats.map((_,i)=>{const a=(i/cats.length)*Math.PI*2-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} stroke="rgba(139,92,246,.12)" strokeWidth="1"/>})}
        <polygon points={pts.map(p=>`${p.x},${p.y}`).join(' ')} fill="rgba(139,92,246,.12)" stroke="#8b5cf6" strokeWidth="2" style={{transition:'all 1.5s cubic-bezier(.23,1,.32,1)'}}/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={5} fill={p.c} stroke="#030712" strokeWidth="2" style={{transition:`all 1.5s cubic-bezier(.23,1,.32,1) ${i*.05}s`}}/>)}
        {pts.map((p,i)=><text key={i} x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="middle" fill="var(--t2)" fontSize="10" fontFamily="JetBrains Mono,monospace">{p.l}</text>)}
      </svg>
    </div>
  );
}

      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 12px 36px rgba(139,92,246,.6)'}}
      onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 8px 28px rgba(139,92,246,.4)'}}>
      ↑
    </button>
  );
}

/* ── CHAT WIDGET ── */
function ChatWidget() {
  const [isOpen, setIsOpen] = useState(false);
  const [soundEnabled, setSoundEnabled] = useState(false);
  const [isListening, setIsListening] = useState(false);
  const [emailProvided, setEmailProvided] = useState(false);
  const [messages, setMessages] = useState([
    { type: 'bot', text: 'Salam! I\'m Saad\'s AI Assistant. Before we begin, please enter your email address so I can keep in touch.' }
  ]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const chatEndRef = useRef(null);
  const recognitionRef = useRef(null);

  const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  useEffect(() => { scrollToBottom(); }, [messages, isTyping]);

  const speakMessage = (text) => {
    if (!soundEnabled) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    if (text.match(/[a-z]/i) && !text.match(/[ء-ي]/)) {
        utterance.lang = 'en-US';
    } else {
        utterance.lang = 'ur-PK';
    }
    window.speechSynthesis.speak(utterance);
  };

  const handleVoiceInput = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Your browser doesn't support speech recognition.");
      return;
    }

    if (!recognitionRef.current) {
        recognitionRef.current = new SpeechRecognition();
        recognitionRef.current.lang = 'en-US';
        recognitionRef.current.interimResults = false;

        recognitionRef.current.onstart = () => setIsListening(true);
        recognitionRef.current.onend = () => setIsListening(false);
        recognitionRef.current.onerror = (event) => {
            console.error("Speech Error:", event.error);
            setIsListening(false);
        };
        recognitionRef.current.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            setInput(transcript);
        };
    }

    if (isListening) {
        recognitionRef.current.stop();
    } else {
        try {
            recognitionRef.current.start();
        } catch (e) {
            console.log("Recognition already started or error:", e);
        }
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!input.trim()) return;
    const userMsg = input.trim();
    setMessages(prev => [...prev, { type: 'user', text: userMsg }]);
    setInput('');

    if (!emailProvided) {
        // Validate email
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(userMsg)) {
            setMessages(prev => [...prev, { type: 'bot', text: 'Please enter a valid email address (e.g., name@example.com).' }]);
            return;
        }

        setIsTyping(true);
        try {
            const response = await fetch(API_BASE + '/save-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userMsg })
            });
            const data = await response.json();
            if (data.status === 'success') {
                setEmailProvided(true);
                const botMsg = "Thank you! How can I help you today? You can ask me about Saad's skills, projects, or experience.";
                setMessages(prev => [...prev, { type: 'bot', text: botMsg }]);
                speakMessage(botMsg);
            }
        } catch (err) {
            setMessages(prev => [...prev, { type: 'bot', text: "System error while saving email. Please try again." }]);
        } finally {
            setIsTyping(false);
        }
        return;
    }

    setIsTyping(true);
    try {
      const response = await fetch(API_BASE + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: userMsg })
      });
      const data = await response.json();
      const botAnswer = data.answer || "I couldn't get a response.";
      setMessages(prev => [...prev, { type: 'bot', text: botAnswer }]);
      speakMessage(botAnswer);
    } catch (err) {
      const errorMsg = "I'm having trouble connecting to my brain. Please make sure Saad's backend server is running!";
      setMessages(prev => [...prev, { type: 'bot', text: errorMsg }]);
      speakMessage(errorMsg);
    } finally {
      setIsTyping(false);
    }
  };

  return (
    <div className="chat-widget-container">
      {isOpen && (
        <div className="chat-window glass">
          <div className="chat-header-mini">
            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <span className="chat-title">AI Assistant</span>
              <button className={`sound-toggle ${soundEnabled?'active':''}`} onClick={()=>setSoundEnabled(!soundEnabled)} title={soundEnabled?'Disable Sound':'Enable Bot Voice'}>
                {soundEnabled?'🔊':'🔈'}
              </button>
            </div>
            <button className="chat-close" onClick={() => setIsOpen(false)}>×</button>
          </div>
          <div className="chat-messages">
            {messages.map((m, i) => (
              <div key={i} className={`chat-message ${m.type}`}>
                <div className="chat-msg-content">{m.text}</div>
              </div>
            ))}
            {isTyping && (
              <div className="chat-message bot">
                <div className="chat-msg-content typing">
                  <span className="dot"></span><span className="dot"></span><span className="dot"></span>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>
          <form className="chat-input-area" onSubmit={handleSubmit}>
            <button type="button" className={`mic-btn ${isListening?'active':''}`} onClick={handleVoiceInput} title="Speak">🎤</button>
            <input type="text" placeholder="Ask about Saad..." value={input} onChange={(e) => setInput(e.target.value)} />
            <button type="submit" style={{background:'var(--g1)', border:'none', borderRadius:'8px', width:'36px', height:'36px', color:'#fff', cursor:'pointer'}}>➤</button>
          </form>
        </div>
      )}
      <button className="chat-bubble" onClick={() => setIsOpen(!isOpen)} style={{ opacity: isOpen ? 0.7 : 1 }}>
        {isOpen ? '×' : '🤖'}
      </button>
    </div>
  );
}

function App(){
  /* Scroll reveal */
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')});
    },{threshold:.12});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);

  return(
    <>
      <Cursor/>
      <ProgressBar/>
      <Navbar/>
      <main>
        <Hero/>
        <About/>
        <Experience/>
        <Skills/>
        <Projects/>
        <Certifications/>
        <Achievements/>
        <Education/>
        <Contact/>
      </main>
      <Footer/>
      <ScrollTop/>
      <ChatWidget/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
