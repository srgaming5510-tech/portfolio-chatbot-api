services:
  - type: web
    name: saad-portfolio-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn chatbot:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
